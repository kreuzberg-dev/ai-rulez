version: "3.0"
name: ai-rulez
description: Shared AI governance for kreuzberg.dev polyglot projects
presets:
  - claude
  - codex
profiles:
  full-polyglot:
    - polyglot
    - organizational
  organizational-only:
    - organizational
default: full-polyglot
builtins:
  - code-quality
  - git-workflow
  - security
  - testing
  - token-efficiency
  - default-commands
compression:
  level: moderate
gitignore: true
